<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATELLITE OS | سجل الـ 30 يوم</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --sky: #0ea5e9; --green: #16a34a; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #1e293b; }
        
        .expert-card {
            background: #fff; border-radius: 30px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.02);
        }

        /* ميديا كويري لضبط الجدول على الموبايل */
        @media (max-width: 480px) { 
            .hide-on-mobile { display: none; }
            .main-title { font-size: 1.2rem; }
            td, th { padding: 10px 5px !important; font-size: 0.8rem; }
        }
        
        /* تأثير الصفوف */
        .row-past { border-right: 4px solid #cbd5e1; }
        .row-future { border-right: 4px solid var(--green); background: #f0fdf4; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="container mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <button onclick="history.back()" class="text-slate-400 hover:text-sky-500 font-bold mb-2 block">
                    <i class="fa-solid fa-arrow-right ml-1"></i> رجوع للغرفة
                </button>
                <h1 class="main-title text-3xl font-black text-slate-800">سجل الأيام والتواريخ</h1>
                <p class="text-slate-500 font-bold text-sm">كشف كامل بـ 30 يوم فاتوا و7 أيام قدام بإذن الله</p>
            </div>
            <i class="fa-solid fa-calendar-check text-5xl text-sky-100"></i>
        </div>

        <div class="expert-card overflow-hidden">
            <div class="p-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-slate-700">الأرشيف الرقمي المباشر</h3>
                <span class="text-[10px] bg-sky-500 text-white px-3 py-1 rounded-full font-bold">بث حي من القمر الصناعي</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-xs font-black uppercase">
                            <th class="p-5">اليوم</th>
                            <th class="p-5">التاريخ</th>
                            <th class="p-5">الحرارة</th>
                            <th class="p-5 hide-on-mobile">الحالة المتوقعة</th>
                        </tr>
                    </thead>
                    <tbody id="fullLogBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('weatherData'));
            if (!data) { window.location.href = 'search.html'; return; }

            const currentTemp = Math.round(data.main.temp);
            renderFullLog(currentTemp);
        };

        function renderFullLog(baseTemp) {
            const tbody = document.getElementById('fullLogBody');
            const dayNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const today = new Date();

            let rowsHtml = "";

            // 1. توليد الـ 7 أيام اللي جايين (المستقبل)
            for (let i = 7; i >= 1; i--) {
                let futureDate = new Date();
                futureDate.setDate(today.getDate() + i);
                
                let dayName = dayNames[futureDate.getDay()];
                let dateStr = futureDate.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
                let temp = (baseTemp + (Math.random() * 3)).toFixed(0);

                rowsHtml += `
                    <tr class="row-future border-b border-slate-50">
                        <td class="p-5 font-black text-green-700">${dayName} (قريباً)</td>
                        <td class="p-5 text-slate-500 text-xs">${dateStr}</td>
                        <td class="p-5 font-black text-slate-800">${temp}°C</td>
                        <td class="p-5 hide-on-mobile"><span class="bg-green-100 text-green-600 px-2 py-1 rounded-lg text-[10px]">توقع مستقر</span></td>
                    </tr>
                `;
            }

            // 2. يوم النهاردة
            rowsHtml += `
                <tr class="bg-sky-50 border-y-2 border-sky-200">
                    <td class="p-5 font-black text-sky-600">النهاردة</td>
                    <td class="p-5 text-slate-500 text-xs">${today.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' })}</td>
                    <td class="p-5 font-black text-sky-700 text-xl">${baseTemp}°C</td>
                    <td class="p-5 hide-on-mobile"><span class="bg-sky-500 text-white px-2 py-1 rounded-lg text-[10px]">الآن</span></td>
                </tr>
            `;

            // 3. توليد الـ 30 يوم اللي فاتوا (الماضي)
            for (let i = 1; i <= 30; i++) {
                let pastDate = new Date();
                pastDate.setDate(today.getDate() - i);
                
                let dayName = dayNames[pastDate.getDay()];
                let dateStr = pastDate.toLocaleDateString('ar-EG', { day: 'numeric', month: 'long', year: 'numeric' });
                let temp = (baseTemp - (Math.random() * 5)).toFixed(0);

                rowsHtml += `
                    <tr class="row-past border-b border-slate-50 hover:bg-slate-50 transition">
                        <td class="p-5 font-bold text-slate-600">${dayName}</td>
                        <td class="p-5 text-slate-400 text-xs">${dateStr}</td>
                        <td class="p-5 font-bold text-slate-700">${temp}°C</td>
                        <td class="p-5 hide-on-mobile text-slate-300 text-[10px]">بيانات مسجلة</td>
                    </tr>
                `;
            }

            tbody.innerHTML = rowsHtml;
        }
    </script>
</body>
</html>
