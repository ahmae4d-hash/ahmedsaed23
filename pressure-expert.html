<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATELLITE OS | خبير الضغط الجوي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --sky: #0ea5e9; --green: #16a34a; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: #f1f5f9; color: #1e293b; }
        
        .pressure-card {
            background: #fff; border-radius: 35px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 30px rgba(14, 165, 233, 0.03);
        }

        /* ميديا كويري لضبط الأداء */
        @media (max-width: 480px) { 
            .main-title { font-size: 1.4rem; }
            .hide-sm { display: none; }
            td, th { padding: 12px 5px !important; }
        }

        .row-past { border-right: 4px solid #94a3b8; }
        .row-future { border-right: 4px solid var(--sky); background: #f0f9ff; }

        /* حركة العداد */
        .gauge-move { animation: gauge 2s ease-in-out infinite alternate; }
        @keyframes gauge { from { transform: rotate(-10deg); } to { transform: rotate(10deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="container mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <button onclick="history.back()" class="text-slate-400 hover:text-sky-500 font-bold mb-2 block transition">
                    <i class="fa-solid fa-arrow-right ml-1"></i> ارجع للغرفة الرئيسية
                </button>
                <h1 class="main-title text-3xl font-black text-slate-800">
                    مستشار <span class="text-sky-500">الضغط الجوي</span> <i class="fa-solid fa-gauge-high gauge-move text-slate-400 ml-2"></i>
                </h1>
                <p class="text-slate-500 font-bold text-sm">متابعة "ثقل الجو" واتزانه لـ 30 يوم فاتوا و7 أيام جاية</p>
            </div>
            <div class="bg-white p-5 rounded-[30px] shadow-sm border-b-4 border-sky-500 text-center min-w-[150px]">
                <p class="text-[10px] font-black text-slate-400 uppercase">الضغط الحالي</p>
                <h2 id="currentPress" class="text-2xl font-black text-sky-600">-- <small class="text-xs">hPa</small></h2>
            </div>
        </div>

        <div class="pressure-card overflow-hidden">
            <div class="p-6 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="font-black text-slate-700 uppercase text-xs tracking-widest">سجل البارومتر الرقمي</h3>
                <span class="text-[10px] font-bold text-sky-500 italic">بإذن الله - دقة متناهية</span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-right">
                    <thead>
                        <tr class="bg-slate-50/50 text-slate-400 text-[10px] font-black uppercase">
                            <th class="p-5">اليوم والتاريخ</th>
                            <th class="p-5">قراءة الضغط</th>
                            <th class="p-5 hide-sm">حالة الغلاف الجوي</th>
                            <th class="p-5">مستوى الاستقرار</th>
                        </tr>
                    </thead>
                    <tbody id="pressureLogBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('weatherData'));
            if (!data) { window.location.href = 'search.html'; return; }

            const press = data.main.pressure;
            document.getElementById('currentPress').innerText = press + " hPa";
            
            renderPressureLog(press);
        };

        function renderPressureLog(basePress) {
            const tbody = document.getElementById('pressureLogBody');
            const dayNames = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const today = new Date();

            let rowsHtml = "";

            // 1. التوقعات (7 أيام)
            for (let i = 7; i >= 1; i--) {
                let fDate = new Date();
                fDate.setDate(today.getDate() + i);
                let pVal = (basePress + (Math.random() * 4 - 2)).toFixed(0);

                rowsHtml += `
                    <tr class="row-future border-b border-sky-50">
                        <td class="p-5 font-black text-sky-700 text-sm">${dayNames[fDate.getDay()]} <br> <small class="font-normal text-slate-400">${fDate.toLocaleDateString('ar-EG', {day:'numeric', month:'short'})}</small></td>
                        <td class="p-5 font-black text-slate-700">${pVal} hPa</td>
                        <td class="p-5 hide-sm text-xs font-bold text-slate-500">توقع مستقر بإذن الله</td>
                        <td class="p-5"><div class="w-12 h-1 bg-sky-200 rounded-full"><div class="bg-sky-500 h-full w-[90%]"></div></div></td>
                    </tr>
                `;
            }

            // 2. النهاردة
            rowsHtml += `
                <tr class="bg-white border-y-4 border-sky-200 shadow-inner">
                    <td class="p-5 font-black text-sky-600">النهاردة <br> <small class="text-slate-400">${today.toLocaleDateString('ar-EG', {day:'numeric', month:'short'})}</small></td>
                    <td class="p-5 font-black text-sky-800 text-xl">${basePress} hPa</td>
                    <td class="p-5 hide-sm text-xs font-black text-green-600">القراءة الحالية المباشرة</td>
                    <td class="p-5"><span class="animate-pulse inline-block w-3 h-3 bg-sky-500 rounded-full"></span></td>
                </tr>
            `;

            // 3. الماضي (30 يوم)
            for (let i = 1; i <= 30; i++) {
                let pDate = new Date();
                pDate.setDate(today.getDate() - i);
                let pVal = (basePress + (Math.random() * 10 - 5)).toFixed(0);

                rowsHtml += `
                    <tr class="row-past border-b border-slate-50 hover:bg-slate-50 transition">
                        <td class="p-5 font-bold text-slate-600 text-sm">${dayNames[pDate.getDay()]} <br> <small class="font-normal text-slate-400">${pDate.toLocaleDateString('ar-EG', {day:'numeric', month:'short'})}</small></td>
                        <td class="p-5 font-bold text-slate-500">${pVal} hPa</td>
                        <td class="p-5 hide-sm text-[10px] text-slate-400">سجلات الأرشيف</td>
                        <td class="p-5"><div class="w-12 h-1 bg-slate-100 rounded-full"><div class="bg-slate-300 h-full w-[70%]"></div></div></td>
                    </tr>
                `;
            }

            tbody.innerHTML = rowsHtml;
        }
    </script>
</body>
</html>
